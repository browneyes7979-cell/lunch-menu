<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>스타 대시보드</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: Arial;
  padding: 10px;
  background: #f2f2f2;
}

h2 { text-align:center; }

.card {
  background: white;
  padding: 12px;
  margin: 10px 0;
  border-radius: 12px;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

button {
  padding: 10px;
  width: 100%;
  border: none;
  border-radius: 8px;
  background: #ff6600;
  color: white;
  font-weight: bold;
}

select, input {
  width: 48%;
  padding: 8px;
  margin: 3px 1%;
}

.flex {
  display: flex;
  justify-content: space-between;
}

</style>
</head>

<body>

<h2>🔥 스타 대시보드</h2>

<div class="card">
<h3>경기 입력</h3>

<div class="flex">
<select id="playerA1"></select>
<select id="playerA2"></select>
</div>

<div class="flex">
<select id="playerB1"></select>
<select id="playerB2"></select>
</div>

<select id="winner">
  <option value="A">A팀 승</option>
  <option value="B">B팀 승</option>
</select>

<button onclick="saveGame()">경기 저장</button>
</div>

<div class="card">
<h3>선수 추가</h3>
<input id="newPlayer" placeholder="이름 입력">
<button onclick="addPlayer()">추가</button>
</div>

<div class="card">
<h3>🏆 랭킹 (MMR)</h3>
<div id="dashboard"></div>
</div>

<div class="card">
<h3>📊 승률 변화</h3>
<canvas id="chart"></canvas>
</div>

<div class="card">
<h3>📅 최근 경기</h3>
<div id="recent"></div>
</div>


<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<script>

const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  databaseURL: "YOUR_DB_URL",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let players = ["상필","홍길동","김철수","이영희"];

function updateSelects() {
  ["playerA1","playerA2","playerB1","playerB2"].forEach(id=>{
    let el=document.getElementById(id);
    el.innerHTML="";
    players.forEach(p=>el.innerHTML+=`<option>${p}</option>`);
  });
}
updateSelects();

function addPlayer(){
  let n=document.getElementById("newPlayer").value;
  if(!n)return;
  players.push(n);
  updateSelects();
}

function saveGame(){
  const game={
    date:new Date().toLocaleDateString(),
    games:[{
      teams:{
        A:[playerA1.value,playerA2.value],
        B:[playerB1.value,playerB2.value]
      },
      winner:winner.value
    }]
  };
  db.ref("games").push(game);
}

db.ref("games").on("value",snap=>{
  let data=[];
  snap.forEach(c=>{
    let v=c.val();
    v.key=c.key;
    data.push(v);
  });

  renderAll(data);
});


// 🔥 MMR 계산
function calcMMR(data){
  let mmr={};
  let K=32;

  data.forEach(m=>{
    m.games.forEach(g=>{
      let A=g.teams.A;
      let B=g.teams.B;

      A.concat(B).forEach(p=>{
        if(!mmr[p]) mmr[p]=1000;
      });

      let avgA=(mmr[A[0]]+mmr[A[1]])/2;
      let avgB=(mmr[B[0]]+mmr[B[1]])/2;

      let EA=1/(1+Math.pow(10,(avgB-avgA)/400));
      let EB=1-EA;

      let SA=g.winner==="A"?1:0;
      let SB=1-SA;

      A.forEach(p=> mmr[p]+=K*(SA-EA));
      B.forEach(p=> mmr[p]+=K*(SB-EB));
    });
  });

  return mmr;
}


// 🔥 렌더 전체
function renderAll(data){

  let stats={};
  let history={};

  data.forEach(m=>{
    m.games.forEach(g=>{
      Object.keys(g.teams).forEach(t=>{
        g.teams[t].forEach(p=>{
          if(!stats[p]) stats[p]={win:0,lose:0};
          if(!history[p]) history[p]=[];

          if(g.winner===t){
            stats[p].win++;
            history[p].push(1);
          }else{
            stats[p].lose++;
            history[p].push(0);
          }
        });
      });
    });
  });

  let mmr=calcMMR(data);

  let arr=Object.keys(stats).map(p=>{
    let s=stats[p];
    let rate=s.win/(s.win+s.lose||1);
    return {p,...s,rate,mmr:mmr[p]||1000};
  });

  arr.sort((a,b)=>b.mmr-a.mmr);

  document.getElementById("dashboard").innerHTML=
    arr.map((x,i)=>`
      <div class="card">
      ${i+1}위 ${x.p}<br>
      MMR: ${x.mmr.toFixed(0)}<br>
      ${x.win}승 ${x.lose}패 (${(x.rate*100).toFixed(1)}%)
      </div>
    `).join("");

  renderChart(history);
  renderRecent(data);
}


// 🔥 그래프
let chart;
function renderChart(history){
  let p=Object.keys(history)[0];
  if(!p)return;

  let h=history[p].slice(-10);
  let data=h.map((_,i)=>h.slice(0,i+1).reduce((a,b)=>a+b)/ (i+1));

  if(chart) chart.destroy();

  chart=new Chart(document.getElementById("chart"),{
    type:"line",
    data:{
      labels:data.map((_,i)=>i+1),
      datasets:[{label:p,data}]
    }
  });
}


// 🔥 최근 경기
function renderRecent(data){
  data.reverse();
  document.getElementById("recent").innerHTML=
    data.map(g=>{
      let game=g.games[0];
      return `
      <div class="card">
      ${g.date}<br>
      ${game.teams.A.join(",")} vs ${game.teams.B.join(",")}<br>
      승리:${game.winner}
      <button onclick="del('${g.key}')">삭제</button>
      </div>`;
    }).join("");
}

function del(k){
  db.ref("games/"+k).remove();
}

</script>

</body>
</html>

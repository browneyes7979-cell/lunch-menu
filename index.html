<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>스타 대시보드</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  font-family: Arial;
  padding: 15px;
  background: #f5f5f5;
}
button {
  padding: 10px;
  margin: 5px 0;
}
.card {
  background: white;
  padding: 10px;
  margin: 10px 0;
  border-radius: 10px;
}
</style>
</head>

<body>

<h2>🔥 스타 대시보드</h2>

<!-- 입력 -->
<h3>경기 저장</h3>
<button onclick="saveGame()">테스트 경기 저장</button>

<!-- 대시보드 -->
<h3>🏆 랭킹</h3>
<div id="dashboard"></div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<script>

// 🔥 네 config 그대로 사용
const firebaseConfig = {
  apiKey: "AIzaSyDKvEB_SrvDSADbqxX0LTgejksxtLt4G6U",
  authDomain: "starcraft-dashboard.firebaseapp.com",
  databaseURL: "https://starcraft-dashboard-default-rtdb.firebaseio.com/",
  projectId: "starcraft-dashboard",
  storageBucket: "starcraft-dashboard.firebasestorage.app",
  messagingSenderId: "153513214633",
  appId: "1:153513214633:web:2fa14175883c4634131fb8"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();


// 🔥 테스트 데이터 저장
function saveGame() {

  const game = {
    date: new Date().toLocaleDateString(),
    games: [
      {
        teams: {
          A: ["상필","홍길동"],
          B: ["김철수","이영희"]
        },
        winner: Math.random() > 0.5 ? "A" : "B"
      }
    ]
  };

  db.ref("games").push(game);
}


// 🔥 데이터 불러오기 + 통계
db.ref("games").on("value", snapshot => {

  let data = [];

  snapshot.forEach(child => {
    data.push(child.val());
  });

  const stats = buildStats(data);
  renderDashboard(stats);
});


// 🔥 개인 통계
function buildStats(data) {

  let stats = {};

  data.forEach(match => {

    match.games.forEach(g => {

      const winner = g.winner;

      Object.keys(g.teams).forEach(team => {

        g.teams[team].forEach(name => {

          if (!stats[name]) stats[name] = {win:0, lose:0};

          if (team === winner) stats[name].win++;
          else stats[name].lose++;
        });
      });
    });
  });

  return stats;
}


// 🔥 화면 표시
function renderDashboard(stats) {

  let arr = Object.keys(stats).map(name => {

    let s = stats[name];
    let total = s.win + s.lose;
    let rate = total ? s.win / total : 0;

    return {
      name,
      win: s.win,
      lose: s.lose,
      rate
    };
  });

  // 승률순 정렬
  arr.sort((a,b)=>b.rate - a.rate);

  let html = "";

  arr.forEach((p, idx) => {

    html += `
      <div class="card">
        ${idx+1}위 - ${p.name}<br>
        ${p.win}승 ${p.lose}패 (${(p.rate*100).toFixed(1)}%)
      </div>
    `;
  });

  document.getElementById("dashboard").innerHTML = html;
}

</script>

</body>
</html>
